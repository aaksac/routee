<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>Yönlendirme | Rota Planlayıcı</title>

    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Rota Planlayıcı" />

    <link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./icons/apple-touch-icon.png" />
    <link rel="manifest" href="./manifest.webmanifest" />

    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/auth.css" />
  </head>
  <body>
    <div class="login-page">
      <div class="login-card compact-login-card">
        <div class="login-brand">
          <div class="brand-icon">R</div>
          <div>
            <h1>Rota Planlayıcı</h1>
            <p>Devam etmek istediğiniz alanı seçin</p>
          </div>
        </div>

        <div class="panel-actions" style="flex-direction: column; align-items: stretch;">
          <button class="small-btn primary" id="btnGoApp" type="button">Uygulamaya Git</button>
          <button class="small-btn" id="btnGoAdmin" type="button">Admin Panele Git</button>
          <button class="small-btn danger-outline" id="btnLogout" type="button">Çıkış Yap</button>
        </div>

        <p id="chooserStatus" class="auth-status">Yetkiler kontrol ediliyor...</p>
      </div>
    </div>

    <script type="module" src="./js/chooser.js"></script>
  </body>
</html>
