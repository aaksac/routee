<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>Şifre Yenile | Rota</title>

    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Rota" />

    <link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./icons/apple-touch-icon.png" />
    <link rel="manifest" href="./manifest.webmanifest" />

    <script type="module" src="./js/version-guard.js"></script>

    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/auth.css" />
  </head>
  <body>
    <div class="login-page">
      <div class="login-card compact-login-card auth-standalone-card">
        <div class="login-brand">
          <div class="brand-icon">R</div>
          <div>
            <h1>Şifre yenile</h1>
            <p>Yeni şifreni belirleyip hesabına geri dön.</p>
          </div>
        </div>

        <div id="resetInfo" class="auth-info-box">Bağlantı kontrol ediliyor...</div>

        <form id="resetForm" class="reset-form" novalidate hidden>
          <div class="field-group">
            <label for="newPassword">Yeni şifre</label>
            <input id="newPassword" type="password" placeholder="En az 6 karakter" autocomplete="new-password" />
          </div>

          <div class="field-group">
            <label for="confirmPassword">Yeni şifre tekrar</label>
            <input id="confirmPassword" type="password" placeholder="Şifreyi tekrar gir" autocomplete="new-password" />
          </div>

          <div class="panel-actions login-actions">
            <button class="small-btn primary" id="btnApplyReset" type="submit">Şifreyi Güncelle</button>
            <a class="small-btn auth-link-btn" href="./index.html">Girişe Dön</a>
          </div>
        </form>
      </div>
    </div>

    <script type="module" src="./js/reset-password.js"></script>
  </body>
</html>
