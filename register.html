<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>Kayıt Ol | Rota</title>

    <meta name="theme-color" content="#0f172a" />
  <meta name="color-scheme" content="light only" />
  <meta name="msapplication-navbutton-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Rota" />

    <link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./icons/apple-touch-icon.png" />
    <link rel="manifest" href="./manifest.webmanifest" />

    <script type="module" src="./js/version-guard.js"></script>
  <script src="./js/status-bar.js"></script>

    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/auth.css" />
  </head>
  <body>
    <div class="login-page">
      <div class="login-card compact-login-card auth-standalone-card">
        <div class="login-brand">
          <div class="brand-icon">R</div>
          <div>
            <h1>Kayıt Ol</h1>
            <p>E-posta ve şifreni girerek yeni hesap oluştur.</p>
          </div>
        </div>

        <form id="registerForm" novalidate>
          <div class="field-group">
            <label for="registerEmail">E-posta</label>
            <input id="registerEmail" type="email" placeholder="ornek@mail.com" autocomplete="email" />
          </div>

          <div class="field-group">
            <label for="registerPassword">Şifre</label>
            <input
              id="registerPassword"
              type="password"
              placeholder="En az 6 karakter"
              autocomplete="new-password"
            />
          </div>

          <div class="field-group">
            <label for="registerPasswordConfirm">Şifre tekrar</label>
            <input
              id="registerPasswordConfirm"
              type="password"
              placeholder="Şifreni tekrar gir"
              autocomplete="new-password"
            />
          </div>

          <div class="panel-actions login-actions">
            <button class="small-btn primary" id="btnCreateAccount" type="submit">Hesabı Oluştur</button>
            <a class="small-btn auth-link-btn" href="./index.html">Girişe Dön</a>
          </div>
        </form>

        <p id="registerStatus" class="auth-status">Bilgilerini girip hesabını oluşturabilirsin.</p>
      </div>
    </div>

    <script type="module" src="./js/register-page.js"></script>
  </body>
</html>
