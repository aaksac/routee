<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>Kayıt Ol | Rota</title>

    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Rota" />

    <link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./icons/apple-touch-icon.png" />
    <link rel="manifest" href="./manifest.webmanifest" />

    <script type="module" src="./js/version-guard.js"></script>

    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/auth.css" />
  </head>
  <body>
    <div class="login-page">
      <div class="login-card compact-login-card">
        <div class="login-brand">
          <div class="brand-icon">R</div>
          <div>
            <h1>Kayıt Ol</h1>
            <p>Yeni hesap oluşturun</p>
          </div>
        </div>

        <div class="field-group">
          <label for="registerEmail">E-posta</label>
          <input id="registerEmail" type="email" placeholder="ornek@mail.com" />
        </div>

        <div class="field-group">
          <label for="registerPassword">Şifre</label>
          <input id="registerPassword" type="password" placeholder="En az 6 karakter" />
        </div>

        <div class="field-group">
          <label for="registerPasswordAgain">Şifre Tekrar</label>
          <input id="registerPasswordAgain" type="password" placeholder="Şifreyi tekrar girin" />
        </div>

        <div class="panel-actions login-actions">
          <button class="small-btn primary" id="btnCreateAccount" type="button">Hesap Oluştur</button>
          <a class="small-btn auth-link-btn" href="./index.html">Girişe Dön</a>
        </div>

        <p id="registerStatus" class="auth-status">Hesap bilgilerinizi girin.</p>
      </div>
    </div>

    <script type="module" src="./js/register-page.js"></script>
  </body>
</html>
