<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Admin Panel | Rota Planlayıcı</title>

  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Rota Planlayıcı" />

  <link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="./icons/apple-touch-icon.png" />
  <link rel="manifest" href="./manifest.webmanifest" />

  <link rel="stylesheet" href="./css/style.css" />
  <style>
      body {
        background:
          radial-gradient(circle at top left, rgba(37, 99, 235, 0.07), transparent 26%),
          linear-gradient(180deg, #f8fbff 0%, #eef4fb 100%);
      }

      .admin-page {
        padding: 22px;
      }

      .admin-shell {
        display: flex;
        flex-direction: column;
        gap: 18px;
        max-width: 1440px;
        margin: 0 auto;
        padding: 18px;
        border: 1px solid rgba(203, 213, 225, 0.9);
        border-radius: 30px;
        background: rgba(255, 255, 255, 0.72);
        backdrop-filter: blur(14px);
        box-shadow:
          0 24px 70px rgba(15, 23, 42, 0.08),
          inset 0 1px 0 rgba(255, 255, 255, 0.75);
      }

      .admin-grid {
        display: grid;
        grid-template-columns: minmax(300px, 380px) minmax(0, 1fr);
        gap: 18px;
        align-items: start;
      }

      .admin-top-panel,
      .admin-users-panel,
      .admin-create-panel,
      .admin-manage-panel {
        position: relative;
        border: 1px solid rgba(203, 213, 225, 0.95);
        background: linear-gradient(180deg, rgba(255,255,255,0.96) 0%, rgba(248,250,252,0.96) 100%);
        box-shadow:
          0 16px 36px rgba(15, 23, 42, 0.06),
          inset 0 1px 0 rgba(255,255,255,0.9);
      }

      .admin-top-panel::before,
      .admin-users-panel::before,
      .admin-create-panel::before,
      .admin-manage-panel::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        pointer-events: none;
        box-shadow: inset 0 0 0 1px rgba(255,255,255,0.45);
      }

      .admin-top-panel {
        padding: 18px 20px;
      }

      .admin-top-panel .auth-status {
        font-size: 0.96rem;
      }

      .admin-users-panel,
      .admin-create-panel,
      .admin-manage-panel {
        padding: 20px;
      }

      .admin-users-panel {
        min-height: 720px;
      }

      .admin-user-toolbar {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-bottom: 14px;
      }

      .admin-user-toolbar-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .admin-user-count {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 42px;
        height: 32px;
        padding: 0 12px;
        border-radius: 999px;
        background: linear-gradient(180deg, #eff6ff 0%, #dbeafe 100%);
        color: #1d4ed8;
        border: 1px solid rgba(59, 130, 246, 0.18);
        font-weight: 700;
        font-size: 0.9rem;
      }

      .admin-search-wrap {
        position: relative;
      }

      .admin-search-wrap input {
        padding-left: 42px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.96);
      }

      .admin-search-icon {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--muted);
        font-size: 0.92rem;
        pointer-events: none;
      }

      .admin-user-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
        max-height: 560px;
        overflow: auto;
        padding-right: 4px;
      }

      .admin-user-list::-webkit-scrollbar {
        width: 8px;
      }

      .admin-user-list::-webkit-scrollbar-thumb {
        background: rgba(100, 116, 139, 0.35);
        border-radius: 999px;
      }

      .admin-user-card {
        width: 100%;
        text-align: left;
        padding: 15px 16px;
        border: 1px solid rgba(203, 213, 225, 0.95);
        background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
        border-radius: 18px;
        transition: 0.2s ease;
        display: flex;
        flex-direction: column;
        gap: 8px;
        box-shadow: 0 8px 22px rgba(15, 23, 42, 0.04);
      }

      .admin-user-card:hover {
        transform: translateY(-1px);
        box-shadow: 0 12px 28px rgba(15, 23, 42, 0.08);
      }

      .admin-user-card.active {
        border-color: rgba(37, 99, 235, 0.45);
        background: linear-gradient(180deg, rgba(239, 246, 255, 0.95) 0%, rgba(219, 234, 254, 0.72) 100%);
        box-shadow:
          0 14px 30px rgba(37, 99, 235, 0.12),
          inset 0 0 0 1px rgba(255,255,255,0.55);
      }

      .admin-user-main {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .admin-user-main strong {
        font-size: 0.98rem;
        color: var(--text);
        word-break: break-word;
      }

      .admin-user-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .user-chip {
        display: inline-flex;
        align-items: center;
        min-height: 28px;
        padding: 4px 10px;
        border-radius: 999px;
        border: 1px solid rgba(203, 213, 225, 0.95);
        background: #fff;
        color: var(--muted);
        font-size: 0.82rem;
      }

      .user-chip.role-premium {
        color: #166534;
        background: #f0fdf4;
        border-color: #bbf7d0;
      }

      .user-chip.role-trial {
        color: #92400e;
        background: #fffbeb;
        border-color: #fde68a;
      }

      .admin-stack {
        display: flex;
        flex-direction: column;
        gap: 18px;
      }

      .admin-form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .admin-actions-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .admin-actions-grid .small-btn {
        width: 100%;
        justify-content: center;
      }

      .admin-info-card {
        padding: 14px 16px;
        border: 1px solid rgba(203, 213, 225, 0.95);
        border-radius: 18px;
        background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
        min-height: 74px;
        display: flex;
        align-items: center;
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.8);
      }

      .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 0.88rem;
        color: var(--muted);
        line-height: 1.5;
        word-break: break-word;
      }

      .admin-label-note {
        display: inline-block;
        margin-top: 6px;
        color: var(--muted);
        font-size: 0.84rem;
      }

      .admin-section-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 14px;
        padding-bottom: 10px;
        border-bottom: 1px solid rgba(226, 232, 240, 0.95);
      }

      .admin-section-title h2 {
        margin: 0;
        font-size: 1.02rem;
      }

      .admin-topbar-actions {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .admin-nav-btn {
        min-height: 42px;
        padding: 10px 14px;
        border-radius: 999px;
        border: 1px solid rgba(203, 213, 225, 0.95);
        background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
        color: var(--text);
        display: inline-flex;
        align-items: center;
        gap: 8px;
        transition: 0.2s ease;
        box-shadow: 0 8px 18px rgba(15, 23, 42, 0.04);
      }

      .admin-nav-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 12px 24px rgba(15, 23, 42, 0.08);
      }

      .admin-nav-btn.is-dark {
        background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
        border-color: #0f172a;
        color: #fff;
      }

      .admin-empty {
        padding: 18px;
        border: 1px dashed rgba(203, 213, 225, 0.95);
        border-radius: 18px;
        color: var(--muted);
        background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
      }

      @media (max-width: 1080px) {
        .admin-grid {
          grid-template-columns: 1fr;
        }

        .admin-users-panel {
          min-height: auto;
        }

        .admin-user-list {
          max-height: none;
        }
      }

      @media (max-width: 760px) {
        .admin-page {
          padding: 14px;
        }

        .admin-shell {
          padding: 14px;
          border-radius: 22px;
        }

        .admin-form-grid,
        .admin-actions-grid {
          grid-template-columns: 1fr;
        }

        .admin-user-toolbar-top {
          flex-direction: column;
          align-items: stretch;
        }

        .admin-topbar-actions {
          width: 100%;
          justify-content: stretch;
        }

        .admin-topbar-actions .admin-nav-btn {
          flex: 1 1 0;
          justify-content: center;
        }

        .admin-top-panel,
        .admin-users-panel,
        .admin-create-panel,
        .admin-manage-panel {
          padding: 16px;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="brand-area">
          <div class="brand-icon">A</div>
          <div class="brand-text">
            <h1>Admin Panel</h1>
            <p>Kullanıcı ve erişim yönetimi</p>
          </div>
        </div>

        <div class="admin-topbar-actions">
          <button class="admin-nav-btn" id="btnBackApp" type="button">
            <span>←</span>
            <span>Uygulamaya Dön</span>
          </button>
          <button class="admin-nav-btn is-dark" id="btnLogout" type="button">
            <span>🚪</span>
            <span>Çıkış</span>
          </button>
        </div>
      </header>

      <div class="admin-page">
        <div class="admin-shell">
          <section class="panel admin-top-panel">
            <div class="panel-header">
              <h2>Oturum</h2>
            </div>
            <p id="adminStatus" class="auth-status">Yükleniyor...</p>
          </section>

          <div class="admin-grid">
            <section class="panel admin-users-panel">
              <div class="admin-user-toolbar">
                <div class="admin-user-toolbar-top">
                  <div class="admin-section-title" style="margin:0; padding:0; border:none;">
                    <h2>Kullanıcılar</h2>
                  </div>
                  <div style="display:flex; align-items:center; gap:10px;">
                    <span id="userCountBadge" class="admin-user-count">0</span>
                    <button class="small-btn" id="btnRefreshUsers" type="button">Yenile</button>
                  </div>
                </div>

                <div class="admin-search-wrap">
                  <span class="admin-search-icon">🔎</span>
                  <input
                    id="userSearchInput"
                    type="text"
                    placeholder="E-posta veya role göre ara..."
                    autocomplete="off"
                  />
                </div>
              </div>

              <div id="adminUserList" class="admin-user-list"></div>
            </section>

            <div class="admin-stack">
              <section class="panel admin-create-panel">
                <div class="admin-section-title">
                  <h2>Yeni Kullanıcı Oluştur</h2>
                </div>

                <div class="field-group">
                  <label for="newUserEmail">E-posta</label>
                  <input id="newUserEmail" type="email" placeholder="kullanici@mail.com" />
                </div>

                <div class="field-group">
                  <label for="newUserPassword">Geçici Şifre</label>
                  <input id="newUserPassword" type="text" placeholder="En az 6 karakter" />
                  <span class="admin-label-note">İlk giriş için geçici şifre belirleyin.</span>
                </div>

                <div class="panel-actions">
                  <button class="small-btn primary" id="btnCreateUser" type="button">
                    Kullanıcı Oluştur
                  </button>
                </div>
              </section>

              <section class="panel admin-manage-panel">
                <div class="admin-section-title">
                  <h2>Seçili Kullanıcı Yönetimi</h2>
                </div>

                <div class="field-group">
                  <label>Seçili Kullanıcı</label>
                  <div class="admin-info-card">
                    <div id="selectedUserInfo" class="mono">Henüz kullanıcı seçilmedi.</div>
                  </div>
                </div>

                <div class="admin-form-grid">
                  <div class="field-group">
                    <label for="accessDays">Tam Erişim Süresi (gün)</label>
                    <input id="accessDays" type="number" min="1" placeholder="30" />
                  </div>

                  <div class="field-group">
                    <label for="accessUntilText">Bitiş Tarihi</label>
                    <input
                      id="accessUntilText"
                      type="text"
                      placeholder="Otomatik hesaplanır"
                      disabled
                    />
                  </div>
                </div>

                <div class="admin-actions-grid">
                  <button class="small-btn primary" id="btnGrantAccess" type="button">
                    Tam Erişim Ver
                  </button>
                  <button class="small-btn" id="btnSetTrial" type="button">
                    Trial Yap
                  </button>
                  <button class="small-btn danger" id="btnDeleteUser" type="button">
                    Kullanıcıyı Sil
                  </button>
                </div>
              </section>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="./js/admin.js"></script>
  </body>
</html>
