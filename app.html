<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Rota Planlayıcı</title>

    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Rota Planlayıcı" />

    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/auth.css" />
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="brand-area">
          <div class="brand-icon">R</div>
          <div class="brand-text">
            <h1>Rota Planlayıcı</h1>
            <p>Kuş uçuşu rota planlama ve harita yönetimi</p>
          </div>
        </div>

        <div class="topbar-actions">
          <button class="icon-btn" id="btnCurrentLocation" type="button" title="Mevcut Konumum">
            📍
            <span>Mevcut Konumum</span>
          </button>

          <button class="icon-btn" id="btnTripList" type="button" title="Gezi Listesi">
            📋
            <span>Gezi Listesi</span>
          </button>

          <button class="icon-btn" id="btnLogoutTop" type="button" title="Çıkış Yap">
            🚪
            <span>Çıkış</span>
          </button>
        </div>
      </header>

      <section class="panel auth-panel" id="authInfoPanel">
        <div class="panel-header">
          <h2>Oturum Bilgisi</h2>
        </div>
        <p id="authStatus" class="auth-status">Yükleniyor...</p>
      </section>

      <main class="layout">
        <aside class="sidebar left-panel">
          <section class="panel">
            <div class="panel-header">
              <h2>Başlangıç Noktası</h2>
            </div>

            <div class="field-group">
              <label for="startName">İsim</label>
              <input id="startName" type="text" placeholder="Başlangıç adı" />
            </div>

            <div class="field-row">
              <div class="field-group">
                <label for="startLat">Enlem</label>
                <input id="startLat" type="number" step="any" placeholder="37.0000" />
              </div>
              <div class="field-group">
                <label for="startLng">Boylam</label>
                <input id="startLng" type="number" step="any" placeholder="35.3213" />
              </div>
            </div>

            <div class="panel-actions">
              <button class="small-btn primary" id="btnAddStartPoint" type="button">
                Başlangıç Ekle
              </button>
            </div>
          </section>

          <section class="panel">
            <div class="panel-header">
              <h2>Nokta Ekle</h2>
            </div>

            <div class="field-group">
              <label for="pointName">Nokta Adı</label>
              <input id="pointName" type="text" placeholder="Örn. Müşteri A" />
            </div>

            <div class="field-row">
              <div class="field-group">
                <label for="pointLat">Enlem</label>
                <input id="pointLat" type="number" step="any" placeholder="37.0100" />
              </div>
              <div class="field-group">
                <label for="pointLng">Boylam</label>
                <input id="pointLng" type="number" step="any" placeholder="35.3300" />
              </div>
            </div>

            <div class="panel-actions">
              <button class="small-btn primary" id="btnAddPoint" type="button">Nokta Ekle</button>
              <button class="small-btn" id="btnClearForm" type="button">Temizle</button>
            </div>
          </section>

          <section class="panel collapsible-panel open">
            <button class="collapse-toggle" type="button" data-target="mapInfoContent">
              <span>Harita Bilgileri</span>
              <span class="collapse-icon">▾</span>
            </button>
            <div class="collapse-content" id="mapInfoContent">
              <div class="field-group">
                <label for="mapName">Harita Adı</label>
                <input id="mapName" type="text" placeholder="Örn. Müşteri Rotası" />
              </div>

              <div class="panel-actions" style="margin-bottom: 14px">
                <button class="small-btn primary" id="btnSaveMap" type="button">Kaydet</button>
              </div>

              <div class="summary-grid">
                <div class="summary-card">
                  <span>Toplam Nokta</span>
                  <strong id="totalPoints">0</strong>
                </div>
                <div class="summary-card">
                  <span>Toplam Mesafe</span>
                  <strong id="totalDistance">0.00 km</strong>
                </div>
              </div>
            </div>
          </section>

          <section class="panel collapsible-panel">
            <button class="collapse-toggle" type="button" data-target="importExportContent">
              <span>İçe / Dışa Aktar</span>
              <span class="collapse-icon">▾</span>
            </button>
            <div class="collapse-content hidden" id="importExportContent">
              <div class="field-group">
                <label for="exportType">Dışa Aktarma Türü</label>
                <select id="exportType">
                  <option value="csv">CSV</option>
                  <option value="xlsx">XLSX</option>
                </select>
              </div>

              <div class="panel-actions">
                <button class="small-btn" id="btnExport" type="button">Dışa Aktar</button>
              </div>

              <div class="field-group" style="margin-top: 14px">
                <label for="importType">İçe Aktarma Türü</label>
                <select id="importType">
                  <option value="csv">CSV</option>
                  <option value="xlsx">XLSX</option>
                </select>
              </div>

              <div class="panel-actions">
                <button class="small-btn" id="btnImport" type="button">İçe Aktar</button>
              </div>

              <input id="csvFileInput" type="file" accept=".csv" hidden />
              <input id="xlsxFileInput" type="file" accept=".xlsx,.xls" hidden />
            </div>
          </section>

          <section class="panel collapsible-panel">
            <button class="collapse-toggle" type="button" data-target="mapListContent">
              <span>Harita Listelerim</span>
              <span class="collapse-icon">▾</span>
            </button>
            <div class="collapse-content hidden" id="mapListContent">
              <div class="panel-actions" style="margin-bottom: 12px">
                <button class="small-btn" id="btnNewMap" type="button">+ Yeni</button>
              </div>

              <div id="mapList" class="map-list"></div>
            </div>
          </section>
        </aside>

        <section class="map-section">
          <div class="map-toolbar">
            <div class="map-badges">
              <span class="badge">Kuş uçuşu rota</span>
              <span class="badge" id="badgeDistance">Toplam: 0.00 km</span>
            </div>

            <div class="map-toolbar-actions">
              <input
                id="placeSearch"
                class="map-search-input"
                type="text"
                placeholder="Haritada yer ara"
              />
              <button class="small-btn" id="btnToggleTripPanel" type="button">
                Gezi Listesi
              </button>
            </div>
          </div>

          <div id="mapCanvas" class="map-canvas"></div>
        </section>

        <aside class="sidebar right-panel open" id="tripPanel">
          <section class="panel trip-panel">
            <div class="panel-header">
              <h2>Gezi Listesi</h2>
              <button class="small-btn danger" id="btnCloseTripPanel" type="button">
                Kapat
              </button>
            </div>

            <div id="tripList" class="trip-list">
              <div class="trip-item start">
                <div class="trip-order">S</div>
                <div class="trip-content">
                  <strong>Başlangıç</strong>
                  <span>Henüz eklenmedi</span>
                </div>
                <button class="tiny-btn" type="button" disabled>Yol Tarifi Al</button>
              </div>
            </div>
          </section>
        </aside>
      </main>
    </div>

    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAmMPvdypgniznktaSq4om2fA1aHZ5Vkqo&libraries=places"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
    <script type="module" src="./js/app.js"></script>
  </body>
</html>
