<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Rota Planlayıcı</title>

    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Rota Planlayıcı" />

    <link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32-v2.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192-v2.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./icons/apple-touch-icon-v2.png" />
    <link rel="apple-touch-icon-precomposed" sizes="180x180" href="./icons/apple-touch-icon-v2.png" />
    <link rel="manifest" href="./manifest.webmanifest" />

    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/auth.css" />
  </head>
  <body>
    <div class="login-page">
      <div class="login-card">
        <div class="login-brand">
          <div class="brand-icon">R</div>
          <div>
            <h1>Rota Planlayıcı</h1>
            <p>Haritalarınızı oluşturun, yönetin ve paylaşın.</p>
          </div>
        </div>

        <div class="login-tabs" role="tablist" aria-label="Giriş ve kayıt sekmeleri">
          <button class="login-tab active" id="tabLogin" type="button" role="tab" aria-selected="true">
            Giriş Yap
          </button>
          <button class="login-tab" id="tabRegister" type="button" role="tab" aria-selected="false">
            Kayıt Ol
          </button>
        </div>

        <div class="auth-panel active" id="panelLogin">
          <div class="field-group">
            <label for="loginEmail">E-posta</label>
            <input id="loginEmail" type="email" placeholder="ornek@mail.com" autocomplete="email" />
          </div>

          <div class="field-group">
            <label for="loginPassword">Şifre</label>
            <div class="password-wrap">
              <input id="loginPassword" type="password" placeholder="Şifreniz" autocomplete="current-password" />
              <button class="password-toggle" id="toggleLoginPassword" type="button" aria-label="Şifreyi göster">
                👁
              </button>
            </div>
          </div>

          <div class="panel-actions auth-actions">
            <button class="small-btn primary" id="btnLogin" type="button">Giriş Yap</button>
            <button class="small-btn" id="btnGuest" type="button">Misafir Girişi</button>
          </div>
        </div>

        <div class="auth-panel" id="panelRegister">
          <div class="field-group">
            <label for="registerEmail">E-posta</label>
            <input id="registerEmail" type="email" placeholder="ornek@mail.com" autocomplete="email" />
          </div>

          <div class="field-group">
            <label for="registerPassword">Şifre</label>
            <div class="password-wrap">
              <input id="registerPassword" type="password" placeholder="En az 6 karakter" autocomplete="new-password" />
              <button class="password-toggle" id="toggleRegisterPassword" type="button" aria-label="Şifreyi göster">
                👁
              </button>
            </div>
          </div>

          <div class="panel-actions auth-actions">
            <button class="small-btn primary" id="btnRegister" type="button">Kayıt Ol</button>
          </div>
        </div>

        <p id="authStatus" class="auth-status">Hazır.</p>
      </div>
    </div>

    <script type="module" src="./js/index.js"></script>
  </body>
</html>
