<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>Giriş | Rota </title>

    <script id="routee-entry-splash-early-lock">
      (function () {
        function isMobileLike() {
          try {
            if (window.matchMedia && window.matchMedia("(max-width: 720px), (hover: none) and (pointer: coarse)").matches) {
              return true;
            }
          } catch (error) {}
          return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(window.navigator.userAgent || "");
        }

        try {
          var isMobile = isMobileLike();
          document.documentElement.classList.add(isMobile ? "routee-mobile-boot" : "routee-desktop-boot");
          if (isMobile) {
            document.documentElement.classList.add("routee-splash-active", "routee-splash-image");
          }
        } catch (error) {}
      })();
    </script>

    <meta name="theme-color" content="#0f172a" />
  <meta name="color-scheme" content="light only" />
  <meta name="msapplication-navbutton-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Rota" />

    <link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./icons/apple-touch-icon.png" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="preload" as="image" href="./icons/splash-1170x2532.png?v=20260502-one-mobile-html-splash" media="(max-width: 720px), (hover: none) and (pointer: coarse)" />


    <style id="routee-critical-boot-css">
      :root {
        --routee-splash-bg: #d8dde3;
        --routee-splash-image: url("./icons/splash-1170x2532.png?v=20260502-one-mobile-html-splash");
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        padding: 0;
        background: #f4f7fb;
      }

      html.routee-splash-active,
      html.routee-splash-active body,
      body.routee-splash-active {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: var(--routee-splash-bg) !important;
        overscroll-behavior: none;
      }

      .startup-splash {
        display: none;
      }

      html.routee-splash-active .startup-splash,
      body.routee-splash-active .startup-splash {
        position: fixed;
        inset: 0;
        z-index: 2147483646;
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        min-height: 100svh;
        margin: 0;
        padding: 0;
        display: grid;
        place-items: center;
        overflow: hidden;
        background: var(--routee-splash-bg);
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
      }

      .routee-splash-image-element {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: fill;
        object-position: center center;
        display: block;
        border: 0;
        user-select: none;
        -webkit-user-drag: none;
        transform: translateZ(0);
        -webkit-transform: translateZ(0);
      }

      html.routee-splash-active .login-page,
      body.routee-splash-active .login-page {
        opacity: 0 !important;
        visibility: hidden !important;
        pointer-events: none !important;
      }

      .routee-splash-card {
        display: none;
      }
    </style>

    <script type="module" src="./js/version-guard.js"></script>
  <script src="./js/status-bar.js"></script>

    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/auth.css" />
    <link rel="stylesheet" href="./css/splash.css" />
  </head>
  <body>
    <div class="startup-splash" id="startupSplash" data-mode="image" aria-hidden="true">
      <img class="routee-splash-image-element" id="startupSplashImage" src="./icons/splash-1170x2532.png?v=20260502-one-mobile-html-splash" alt="" aria-hidden="true" decoding="async" fetchpriority="high" />
      <div class="routee-splash-card" aria-live="polite" aria-atomic="true">
        <div class="routee-splash-logo" aria-hidden="true">R</div>
        <p class="routee-splash-title" id="startupSplashTitle">Rota</p>
        <p class="routee-splash-text" id="startupSplashText">Oturumunuz açılıyor</p>
        <div class="routee-splash-dots" aria-hidden="true"><span></span><span></span><span></span></div>
      </div>
    </div>

    <div class="login-page" id="loginPage" aria-hidden="false">
      <div class="login-card compact-login-card">
        <div class="login-brand">
          <div class="brand-icon">R</div>
          <div>
            <h1>Rota</h1>
            <p>Giriş yapın veya kayıt olun</p>
          </div>
        </div>

        <div class="field-group">
          <label for="loginEmail">E-posta</label>
          <input id="loginEmail" type="email" placeholder="ornek@mail.com" />
        </div>

        <div class="field-group">
          <label for="loginPassword">Şifre</label>
          <input id="loginPassword" type="password" placeholder="Şifre" />
        </div>

        <div class="panel-actions login-actions">
          <button class="small-btn primary" id="btnLogin" type="button">Giriş Yap</button>
          <button class="small-btn" id="btnRegister" type="button">Kayıt Ol</button>
          <button class="small-btn" id="btnResetPassword" type="button">Şifre Sıfırla</button>
        </div>

        <p id="authStatus" class="auth-status">Henüz giriş yapılmadı.</p>
      </div>
    </div>

    <script type="module" src="./js/login-page.js"></script>
  </body>
</html>
