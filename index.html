    <script id="routee-mobile-entry-splash-early-lock">
      (function () {
        try {
          var mobileQuery = "(max-width: 720px), (hover: none) and (pointer: coarse)";
          var isMobile = false;
          try { isMobile = window.matchMedia && window.matchMedia(mobileQuery).matches; } catch (queryError) { isMobile = false; }
          if (!isMobile) {
            isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(window.navigator.userAgent || "");
          }
          if (isMobile) {
            document.documentElement.classList.add("routee-mobile-splash-active", "routee-mobile-splash-image");
          }
        } catch (error) {}
      })();
    </script>

    <style id="routee-critical-boot-css">
      :root {
        --routee-splash-bg: #0b1222;
        --routee-splash-image: url("./icons/splash-1170x2532.png?v=20260501-pro-light");
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--routee-splash-bg);
      }

      body.auth-booting {
        overflow: hidden;
        background: var(--routee-splash-bg);
      }

      .startup-splash {
        position: fixed;
        inset: 0;
        z-index: 2147483646;
        width: 100vw;
        height: 100vh;
        height: 100svh;
        height: 100dvh;
        min-height: -webkit-fill-available;
        margin: 0;
        padding: 0;
        display: block;
        overflow: hidden;
        background-color: var(--routee-splash-bg);
        background-image: var(--routee-splash-image);
        background-position: center center;
        background-size: 100% 100%;
        background-repeat: no-repeat;
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transform: translateZ(0);
        -webkit-transform: translateZ(0);
        backface-visibility: hidden;
        -webkit-backface-visibility: hidden;
      }

      .startup-splash.is-visible,
      html.routee-mobile-splash-active .startup-splash,
      body.routee-mobile-splash-active .startup-splash {
        opacity: 1 !important;
        visibility: visible !important;
        pointer-events: auto !important;
      }

      html.routee-mobile-splash-active,
      html.routee-mobile-splash-active body,
      body.routee-mobile-splash-active {
        width: 100%;
        height: 100%;
        min-height: 100svh;
        min-height: 100dvh;
        margin: 0;
        overflow: hidden !important;
        background: var(--routee-splash-bg) !important;
        overscroll-behavior: none;
      }

      html.routee-mobile-splash-active .login-page,
      body.routee-mobile-splash-active .login-page {
        opacity: 0 !important;
        visibility: hidden !important;
        pointer-events: none !important;
      }

      .startup-splash > * {
        display: none !important;
      }
    </style>

  <body class="auth-booting">
    <div class="startup-splash is-visible" id="startupSplash" aria-hidden="false"></div>

    <div class="login-page login-page--hidden" id="loginPage" aria-hidden="true">
      <div class="login-card compact-login-card">
        <div class="login-brand">
          <div class="brand-icon">R</div>
          <div>
            <h1>Rota</h1>
            <p>Giriş yapın veya kayıt olun</p>
          </div>
        </div>

        <div class="field-group">
          <label for="loginEmail">E-posta</label>
          <input id="loginEmail" type="email" placeholder="ornek@mail.com" />
        </div>

        <div class="field-group">
          <label for="loginPassword">Şifre</label>
          <input id="loginPassword" type="password" placeholder="Şifre" />
        </div>

        <div class="panel-actions login-actions">
          <button class="small-btn primary" id="btnLogin" type="button">Giriş Yap</button>
          <button class="small-btn" id="btnRegister" type="button">Kayıt Ol</button>
          <button class="small-btn" id="btnResetPassword" type="button">Şifre Sıfırla</button>
        </div>

        <p id="authStatus" class="auth-status">Henüz giriş yapılmadı.</p>
      </div>
    </div>

    <script type="module" src="./js/login-page.js"></script>
  </body>
