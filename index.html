<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>Giriş | Rota Planlayıcı</title>

    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Rota Planlayıcı" />

    <link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./icons/apple-touch-icon.png" />
    <link rel="manifest" href="./manifest.webmanifest" />

    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/auth.css" />
  </head>
  <body>
    <div class="login-page">
      <div class="login-card compact-login-card">
        <div class="login-brand">
          <div class="brand-icon">R</div>
          <div>
            <h1>Rota Planlayıcı</h1>
            <p>Giriş yapın veya kayıt olun</p>
          </div>
        </div>

        <div class="field-group">
          <label for="loginEmail">E-posta</label>
          <input id="loginEmail" type="email" placeholder="ornek@mail.com" />
        </div>

        <div class="field-group">
          <label for="loginPassword">Şifre</label>
          <input id="loginPassword" type="password" placeholder="Şifre" />
        </div>

        <div class="panel-actions login-actions">
          <button class="small-btn primary" id="btnLogin" type="button">Giriş Yap</button>
          <button class="small-btn" id="btnRegister" type="button">Kayıt Ol</button>
          <button class="small-btn" id="btnResetPassword" type="button">Şifre Sıfırla</button>
        </div>

        <div
          id="offlineAlert"
          style="
            display:none;
            width:100%;
            margin-top:14px;
            margin-bottom:12px;
            background:rgba(15,23,42,0.96);
            color:#fff;
            border-radius:16px;
            padding:14px 16px;
            box-shadow:0 10px 24px rgba(0,0,0,.18);
            box-sizing:border-box;
          "
        >
          <div style="display:flex; align-items:center; gap:12px;">
            <div style="font-size:22px; flex-shrink:0;">📶</div>
            <div style="flex:1;">
              <strong style="display:block; font-size:15px; margin-bottom:4px;">Bağlantı gerekli</strong>
              <p style="margin:0; font-size:13px; line-height:1.4; opacity:.92;">
                Lütfen internet bağlantınızı kontrol edin ve tekrar deneyin.
              </p>
            </div>
            <button
              id="offlineAlertClose"
              type="button"
              aria-label="Kapat"
              style="
                border:none;
                background:transparent;
                color:#fff;
                font-size:26px;
                cursor:pointer;
                line-height:1;
                padding:0 4px;
                flex-shrink:0;
              "
            >×</button>
          </div>
        </div>

        <p id="authStatus" class="auth-status">Henüz giriş yapılmadı.</p>
      </div>
    </div>

    <script type="module" src="./js/login-page.js?v=99"></script>

    <script>
      async function requestPersistentStorage() {
        if (!navigator.storage || !navigator.storage.persist) return;

        try {
          const alreadyPersisted = await navigator.storage.persisted();
          if (alreadyPersisted) return;
          await navigator.storage.persist();
        } catch (error) {
          console.warn("Persistent storage isteği başarısız:", error);
        }
      }

      if ("serviceWorker" in navigator) {
        window.addEventListener("load", async () => {
          try {
            await navigator.serviceWorker.register("./sw.js");
            await requestPersistentStorage();
          } catch (error) {
            console.error("Service Worker kayıt hatası:", error);
          }
        });
      }
    </script>
  </body>
</html>
