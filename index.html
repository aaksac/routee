<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>Giriş | Rota </title>

    <script id="routee-entry-splash-early-lock">
      (function () {
        function isMobileLike() {
          try {
            if (window.matchMedia && window.matchMedia("(max-width: 720px), (hover: none) and (pointer: coarse)").matches) {
              return true;
            }
          } catch (error) {}
          return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(window.navigator.userAgent || "");
        }

        var lockedSplashHeight = 0;
        function syncSplashHeight() {
          try {
            var root = document.documentElement;
            var viewport = window.visualViewport;
            var rawWidth = Math.max(
              window.innerWidth || 0,
              root.clientWidth || 0,
              viewport && viewport.width ? viewport.width : 0
            );
            var rawHeight = Math.max(
              window.innerHeight || 0,
              root.clientHeight || 0,
              viewport && viewport.height ? viewport.height : 0
            );
            var width = Math.ceil(rawWidth);
            var height = Math.ceil(rawHeight);
            var isLandscape = width > height && width >= 720;

            if (width > 0) {
              root.style.setProperty("--routee-splash-width", width + "px");
            }

            root.classList.toggle("routee-splash-landscape", isLandscape);
            root.classList.toggle("routee-splash-portrait", !isLandscape);

            if (isLandscape) {
              // Tablette yatay splash, ekran yüksekliğinden büyük kilitlenirse görselin üst kısmı basık/kırpık algılanır.
              // Bu yüzden yatayda yalnızca gerçek görsel viewport yüksekliği kullanılır.
              lockedSplashHeight = height || lockedSplashHeight;
            } else {
              var values = [
                height || 0,
                window.screen && window.screen.height ? window.screen.height : 0
              ];
              var nextHeight = Math.ceil(Math.max.apply(Math, values));
              if (nextHeight > lockedSplashHeight) {
                lockedSplashHeight = nextHeight;
              }
            }

            if (lockedSplashHeight > 0) {
              root.style.setProperty("--routee-splash-height", lockedSplashHeight + "px");
            }
          } catch (error) {}
        }

        try {
          var isMobile = isMobileLike();
          document.documentElement.classList.add(isMobile ? "routee-mobile-boot" : "routee-desktop-boot");
          if (isMobile) {
            syncSplashHeight();
            document.documentElement.classList.add("routee-splash-active", "routee-splash-image");
            window.addEventListener("resize", syncSplashHeight, { passive: true });
            window.addEventListener("orientationchange", function () {
              lockedSplashHeight = 0;
              window.setTimeout(syncSplashHeight, 80);
            }, { passive: true });
            if (window.visualViewport) {
              window.visualViewport.addEventListener("resize", syncSplashHeight, { passive: true });
            }
          }
        } catch (error) {}
      })();
    </script>

    <meta name="theme-color" content="#0f172a" />
  <meta name="color-scheme" content="light only" />
  <meta name="msapplication-navbutton-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./icons/apple-touch-icon.png" />
    <link rel="manifest" href="./manifest.webmanifest" />

    <link rel="preload" as="image" href="./icons/splash-1536x2048.png?v=20260503-tablet-splash-ratio" media="(min-width: 721px) and (orientation: portrait) and (hover: none) and (pointer: coarse)" />
    <link rel="preload" as="image" href="./icons/splash-tablet-landscape-2048x1536.png?v=20260503-tablet-splash-ratio" media="(min-width: 721px) and (min-height: 560px) and (orientation: landscape) and (hover: none) and (pointer: coarse)" />


    <style id="routee-critical-boot-css">
      :root {
        --routee-splash-bg: #d8dde3;
        --routee-splash-edge-bg: #162533;
        --routee-splash-height: 100vh;
        --routee-splash-image: url("./icons/splash-1170x2532.png?v=20260503-tablet-splash-ratio");
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        padding: 0;
        background: #f4f7fb;
      }

      html.routee-splash-active,
      html.routee-splash-active body,
      body.routee-splash-active {
        width: 100%;
        height: var(--routee-splash-height, 100vh);
        min-height: 100vh;
        overflow: hidden;
        background: var(--routee-splash-edge-bg, var(--routee-splash-bg)) !important;
        overscroll-behavior: none;
      }

      .startup-splash {
        display: none;
      }

      html.routee-splash-active .startup-splash,
      body.routee-splash-active .startup-splash {
        position: fixed;
        left: 0;
        top: 0;
        right: 0;
        bottom: auto;
        z-index: 2147483646;
        width: 100vw;
        height: var(--routee-splash-height, 100vh);
        min-height: 100vh;
        margin: 0;
        padding: 0;
        display: grid;
        place-items: center;
        overflow: hidden;
        background: var(--routee-splash-edge-bg, var(--routee-splash-bg));
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
      }

      .routee-splash-picture {
        position: absolute;
        inset: 0;
        z-index: 0;
        display: block;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      .routee-splash-image-element {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center center;
        display: block;
        border: 0;
        user-select: none;
        -webkit-user-drag: none;
        transform: translateZ(0);
        -webkit-transform: translateZ(0);
      }

      html.routee-splash-active .login-page,
      body.routee-splash-active .login-page {
        opacity: 0 !important;
        visibility: hidden !important;
        pointer-events: none !important;
      }

      .routee-splash-card {
        display: none;
      }
    </style>

    <script type="module" src="./js/version-guard.js"></script>
  <script src="./js/status-bar.js"></script>

    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/auth.css" />
    <link rel="stylesheet" href="./css/splash.css" />
    <link rel="stylesheet" href="./css/android.css" />
  </head>
  <body>
    <div class="startup-splash" id="startupSplash" data-mode="image" aria-hidden="true">
      <picture class="routee-splash-picture" aria-hidden="true">
        <source media="(min-width: 721px) and (min-height: 560px) and (orientation: landscape) and (hover: none) and (pointer: coarse)" srcset="./icons/splash-tablet-landscape-2048x1536.png?v=20260503-tablet-splash-ratio" />
        <source media="(min-width: 721px) and (orientation: portrait) and (hover: none) and (pointer: coarse)" srcset="./icons/splash-1536x2048.png?v=20260503-tablet-splash-ratio 1536w, ./icons/splash-2048x2732.png?v=20260503-tablet-splash-ratio 2048w" sizes="100vw" />
        <img class="routee-splash-image-element" id="startupSplashImage" src="./icons/splash-1170x2532.png?v=20260503-tablet-splash-ratio" alt="" aria-hidden="true" decoding="async" fetchpriority="high" />
      </picture>
      <div class="routee-splash-card" aria-live="polite" aria-atomic="true">
        <div class="routee-splash-logo" aria-hidden="true">R</div>
        <p class="routee-splash-title" id="startupSplashTitle">Rota</p>
        <p class="routee-splash-text" id="startupSplashText">Oturumunuz açılıyor</p>
        <div class="routee-splash-dots" aria-hidden="true"><span></span><span></span><span></span></div>
      </div>
    </div>

    <div class="login-page" id="loginPage" aria-hidden="false">
      <div class="login-card compact-login-card">
        <div class="login-brand">
          <div class="brand-icon">R</div>
          <div>
            <h1>Rota</h1>
            <p>Giriş yapın veya kayıt olun</p>
          </div>
        </div>

        <div class="field-group">
          <label for="loginEmail">E-posta</label>
          <input id="loginEmail" type="email" placeholder="ornek@mail.com" />
        </div>

        <div class="field-group">
          <label for="loginPassword">Şifre</label>
          <input id="loginPassword" type="password" placeholder="Şifre" />
        </div>

        <div class="panel-actions login-actions">
          <button class="small-btn primary" id="btnLogin" type="button">Giriş Yap</button>
          <button class="small-btn" id="btnRegister" type="button">Kayıt Ol</button>
          <button class="small-btn" id="btnResetPassword" type="button">Şifre Sıfırla</button>
        </div>

        <p id="authStatus" class="auth-status">Henüz giriş yapılmadı.</p>
      </div>
    </div>

    <script type="module" src="./js/login-page.js"></script>
  </body>
</html>
