<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>Giriş | Rota </title>

    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Rota" />

    <link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./icons/apple-touch-icon.png" />
    <link rel="manifest" href="./manifest.webmanifest" />

    <style id="routee-critical-splash-style">
    html, body { background: #0f172a; }
    .startup-splash, #routeeNativeSplash {
      position: fixed;
      inset: 0;
      z-index: 999999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: radial-gradient(circle at top, rgba(37,99,235,.26), transparent 36%), linear-gradient(180deg, #0f172a 0%, #111827 100%);
      color: #fff;
      font-family: Inter, Arial, sans-serif;
    }
    .startup-splash:not(.is-visible):not(.app-startup-splash), .app-startup-splash:not(.is-visible) { opacity: 0; visibility: hidden; pointer-events: none; }
    .startup-splash.is-visible, .show-app-startup-splash .app-startup-splash, #routeeNativeSplash { opacity: 1; visibility: visible; pointer-events: auto; }
    #routeeNativeSplash.routee-native-splash-hidden { opacity: 0; visibility: hidden; pointer-events: none; transition: opacity 180ms ease, visibility 180ms ease; }
    .startup-splash-card, .routee-native-splash-card {
      position: relative;
      width: min(84vw, 340px);
      display: grid;
      justify-items: center;
      gap: 14px;
      padding: 28px 24px 24px;
      border-radius: 28px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.14);
      box-shadow: 0 28px 80px rgba(0,0,0,.32);
      -webkit-backdrop-filter: blur(18px);
      backdrop-filter: blur(18px);
      text-align: center;
      overflow: hidden;
    }
    .startup-splash-orb, .routee-native-splash-orb {
      position: absolute;
      top: -42px;
      width: 160px;
      height: 160px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(96,165,250,.36), rgba(96,165,250,0));
      filter: blur(10px);
      z-index: -1;
    }
    .startup-splash-logo, .routee-native-splash-logo {
      width: 74px;
      height: 74px;
      border-radius: 24px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #2563eb, #0f172a);
      color: #fff;
      font-size: 1.9rem;
      font-weight: 900;
      box-shadow: 0 18px 38px rgba(37,99,235,.28);
      overflow: hidden;
    }
    .startup-splash-logo img { display: block; width: 100%; height: 100%; object-fit: cover; }
    .startup-splash-copy, .routee-native-splash-copy { display: grid; gap: 7px; }
    .startup-splash-copy strong, .routee-native-splash-copy strong { color: #fff; font-size: 1.16rem; letter-spacing: -.01em; }
    .startup-splash-copy span, .routee-native-splash-copy span { color: rgba(255,255,255,.76); font-size: .92rem; line-height: 1.45; }
    .startup-splash-loader, .routee-native-splash-loader { display: inline-flex; align-items: center; gap: 8px; }
    .startup-splash-loader span, .routee-native-splash-loader span { width: 8px; height: 8px; border-radius: 999px; background: rgba(255,255,255,.92); animation: routeeCriticalSplashPulse 1s infinite ease-in-out; }
    .startup-splash-loader span:nth-child(2), .routee-native-splash-loader span:nth-child(2) { animation-delay: .16s; }
    .startup-splash-loader span:nth-child(3), .routee-native-splash-loader span:nth-child(3) { animation-delay: .32s; }
    @keyframes routeeCriticalSplashPulse { 0%, 80%, 100% { opacity: .35; transform: scale(.82); } 40% { opacity: 1; transform: scale(1); } }
  </style>

  <script type="module" src="./js/version-guard.js"></script>

    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/auth.css" />
  </head>
  <body class="auth-booting">
    <div class="startup-splash is-visible" id="startupSplash" aria-hidden="false">
      <div class="startup-splash-card">
        <div class="startup-splash-orb" aria-hidden="true"></div>
        <div class="startup-splash-logo">
          <img
            src="./icons/icon-192.png"
            alt="Rota Planlayıcı logosu"
            width="74"
            height="74"
            decoding="async"
          />
        </div>
        <div class="startup-splash-copy">
          <strong id="startupSplashTitle">Rota</strong>
          <span id="startupSplashText">Oturumunuz kontrol ediliyor...</span>
        </div>
        <div class="startup-splash-loader" aria-hidden="true">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>

    <div class="login-page login-page--hidden" id="loginPage" aria-hidden="true">
      <div class="login-card compact-login-card">
        <div class="login-brand">
          <div class="brand-icon">R</div>
          <div>
            <h1>Rota</h1>
            <p>Giriş yapın veya kayıt olun</p>
          </div>
        </div>

        <div class="field-group">
          <label for="loginEmail">E-posta</label>
          <input id="loginEmail" type="email" placeholder="ornek@mail.com" />
        </div>

        <div class="field-group">
          <label for="loginPassword">Şifre</label>
          <input id="loginPassword" type="password" placeholder="Şifre" />
        </div>

        <div class="panel-actions login-actions">
          <button class="small-btn primary" id="btnLogin" type="button">Giriş Yap</button>
          <button class="small-btn" id="btnRegister" type="button">Kayıt Ol</button>
          <button class="small-btn" id="btnResetPassword" type="button">Şifre Sıfırla</button>
        </div>

        <p id="authStatus" class="auth-status">Henüz giriş yapılmadı.</p>
      </div>
    </div>

    <script type="module" src="./js/login-page.js"></script>
  </body>
</html>
