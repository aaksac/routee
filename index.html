    <link rel="apple-touch-startup-image" href="./icons/splash-1125x2436.png" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="./icons/splash-1170x2532.png" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />

    <link rel="apple-touch-startup-image" href="./icons/splash-1242x2688.png" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="./icons/splash-1284x2778.png" media="(device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="./icons/splash-1290x2796.png" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />

    <link rel="apple-touch-startup-image" href="./icons/splash-1668x2224.png" media="(device-width: 834px) and (device-height: 1112px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="./icons/splash-1668x2388.png" media="(device-width: 834px) and (device-height: 1194px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="./icons/splash-2048x2732.png" media="(device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
    <link rel="manifest" href="./manifest.webmanifest" />


    <style id="routee-critical-boot-css">
      html, body { margin: 0; min-height: 100%; background: #0f172a; }
      body.auth-booting { overflow: hidden; background: #0f172a; }
      .startup-splash { position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center; box-sizing: border-box; padding: max(24px, env(safe-area-inset-top)) max(24px, env(safe-area-inset-right)) max(24px, env(safe-area-inset-bottom)) max(24px, env(safe-area-inset-left)); background: radial-gradient(circle at top, rgba(37,99,235,.18), transparent 34%), linear-gradient(180deg, rgba(8,15,30,.98) 0%, rgba(15,23,42,.98) 100%); color: #fff; opacity: 0; visibility: hidden; pointer-events: none; }
      .startup-splash.is-visible, .show-app-startup-splash .app-startup-splash { opacity: 1; visibility: visible; pointer-events: auto; }
      .startup-splash-card { position: relative; width: min(360px, 100%); display: grid; justify-items: center; gap: 16px; box-sizing: border-box; padding: 30px 24px 26px; border-radius: 30px; border: 1px solid rgba(255,255,255,.10); background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.06)); box-shadow: 0 28px 70px rgba(0,0,0,.24); text-align: center; overflow: hidden; }
      .startup-splash-orb { position: absolute; top: -42px; width: 160px; height: 160px; border-radius: 999px; background: radial-gradient(circle, rgba(96,165,250,.38), rgba(96,165,250,0)); filter: blur(10px); }
      .startup-splash-logo { width: 82px; height: 82px; border-radius: 26px; display: grid; place-items: center; background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.10); box-shadow: 0 18px 36px rgba(37,99,235,.16); overflow: hidden; }
      .startup-splash-logo img { display: block; width: 100%; height: 100%; object-fit: cover; }
      .startup-splash-copy { display: grid; gap: 7px; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .startup-splash-copy strong { color: #fff; font-size: 1.2rem; letter-spacing: .01em; }
      .startup-splash-copy span { color: rgba(255,255,255,.78); font-size: .96rem; line-height: 1.55; }
      .startup-splash-loader { display: inline-flex; align-items: center; gap: 8px; }
      .startup-splash-loader span { width: 9px; height: 9px; border-radius: 999px; background: rgba(255,255,255,.92); animation: startupSplashPulse 1s infinite ease-in-out; }
      .startup-splash-loader span:nth-child(2) { animation-delay: .16s; }
      .startup-splash-loader span:nth-child(3) { animation-delay: .32s; }
      @keyframes startupSplashPulse { 0%, 80%, 100% { opacity: .35; transform: scale(.82); } 40% { opacity: 1; transform: scale(1); } }
      @media (max-width: 640px) { .startup-splash-card { width: min(320px, 100%); padding: 24px 18px 22px; border-radius: 24px; } .startup-splash-logo { width: 72px; height: 72px; border-radius: 22px; } }
    </style>

    <script type="module" src="./js/version-guard.js"></script>

    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/auth.css" />
  </head>
  <body class="auth-booting">
    <div class="startup-splash is-visible" id="startupSplash" aria-hidden="false">
      <div class="startup-splash-card">
        <div class="startup-splash-orb" aria-hidden="true"></div>
        <div class="startup-splash-logo">
          <img
            src="./icons/icon-192.png"
            alt="Rota Planlayıcı logosu"
            width="74"
            height="74"
            decoding="async"
          />
        </div>
        <div class="startup-splash-copy">
          <strong id="startupSplashTitle">Rota</strong>
          <span id="startupSplashText">Oturumunuz kontrol ediliyor...</span>
        </div>
        <div class="startup-splash-loader" aria-hidden="true">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>

    <div class="login-page login-page--hidden" id="loginPage" aria-hidden="true">
      <div class="login-card compact-login-card">
        <div class="login-brand">
          <div class="brand-icon">R</div>
          <div>
            <h1>Rota</h1>
            <p>Giriş yapın veya kayıt olun</p>
          </div>
        </div>

        <div class="field-group">
          <label for="loginEmail">E-posta</label>
          <input id="loginEmail" type="email" placeholder="ornek@mail.com" />
        </div>

        <div class="field-group">
          <label for="loginPassword">Şifre</label>
          <input id="loginPassword" type="password" placeholder="Şifre" />
        </div>

        <div class="panel-actions login-actions">
          <button class="small-btn primary" id="btnLogin" type="button">Giriş Yap</button>
          <button class="small-btn" id="btnRegister" type="button">Kayıt Ol</button>
          <button class="small-btn" id="btnResetPassword" type="button">Şifre Sıfırla</button>
        </div>

        <p id="authStatus" class="auth-status">Henüz giriş yapılmadı.</p>
      </div>
    </div>

    <script type="module" src="./js/login-page.js"></script>
  </body>
</html>
